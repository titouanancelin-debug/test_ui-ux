<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Gabarit affiche — fond terracotta, sérigraphie papier
       Hachures coin + physalis centré + zone titre bas -->
  <rect width="400" height="500" fill="#B84A2E"/>

  <!-- Hachures coin supérieur gauche -->
  <g opacity="0.12">
    <pattern id="h" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#F4E8D5" stroke-width="0.5"/>
    </pattern>
    <rect width="400" height="500" fill="url(#h)"/>
  </g>

  <!-- Physalis centré (grande lanterne) -->
  <g transform="translate(200,310) scale(1.3)" opacity="0.45">
    <path d="M0,0 C-52,-18,-75,-60,-50,-100 C-28,-122,0,-132,0,-132" stroke="#F4E8D5" stroke-width="1.9" fill="none" opacity=".9" stroke-linecap="round"/>
    <path d="M0,0 C52,-18,75,-60,50,-100 C28,-122,0,-132,0,-132" stroke="#F4E8D5" stroke-width="1.9" fill="none" opacity=".9" stroke-linecap="round"/>
    <path d="M0,0 C-26,-14,-44,-52,-28,-92 C-14,-118,0,-132,0,-132" stroke="#F4E8D5" stroke-width="1.4" fill="none" opacity=".74" stroke-linecap="round"/>
    <path d="M0,0 C26,-14,44,-52,28,-92 C14,-118,0,-132,0,-132" stroke="#F4E8D5" stroke-width="1.4" fill="none" opacity=".74" stroke-linecap="round"/>
    <path d="M0,0 C1,-32,0,-82,0,-132" stroke="#F4E8D5" stroke-width="1.1" fill="none" opacity=".58" stroke-linecap="round"/>
    <path d="M-42,-30 C-15,-38,15,-38,42,-30" stroke="#F4E8D5" stroke-width="0.95" fill="none" opacity=".55"/>
    <path d="M-60,-56 C-24,-64,24,-64,60,-56" stroke="#F4E8D5" stroke-width="0.87" fill="none" opacity=".49"/>
    <path d="M-64,-82 C-24,-90,24,-90,64,-82" stroke="#F4E8D5" stroke-width="0.79" fill="none" opacity=".43"/>
    <path d="M-46,-106 C-18,-113,18,-113,46,-106" stroke="#F4E8D5" stroke-width="0.71" fill="none" opacity=".37"/>
    <ellipse cx="0" cy="-66" rx="25" ry="27" fill="#F4E8D5" opacity=".85"/>
    <ellipse cx="-8" cy="-74" rx="7" ry="8" fill="rgba(255,255,255,0.2)"/>
    <circle cx="0" cy="-132" r="3.2" fill="#F4E8D5" opacity=".55"/>
  </g>

  <!-- Numéro (coin haut gauche) -->
  <text x="24" y="48" fill="#F4E8D5" opacity="0.6" font-family="'Courier New', monospace" font-size="12" letter-spacing="2px">№ 01</text>

  <!-- Zone titre -->
  <text x="24" y="442" fill="#F4E8D5" font-family="Georgia, serif" font-size="42" font-style="italic" letter-spacing="-0.02em">Titre du spectacle</text>
  <text x="24" y="470" fill="#F4E8D5" opacity="0.8" font-family="'Courier New', monospace" font-size="11" letter-spacing="2px">SOUS-TITRE · DATE · LIEU</text>

  <!-- Ligne de base -->
  <line x1="24" y1="482" x2="376" y2="482" stroke="#F4E8D5" stroke-width="0.5" opacity="0.3"/>

  <!-- Logo mark coin bas droit -->
  <g transform="translate(360,488) scale(0.18)">
    <path d="M0,0 C-52,-18,-75,-60,-50,-100 C-28,-122,0,-132,0,-132" stroke="#F4E8D5" stroke-width="3" fill="none"/>
    <path d="M0,0 C52,-18,75,-60,50,-100 C28,-122,0,-132,0,-132" stroke="#F4E8D5" stroke-width="3" fill="none"/>
    <path d="M0,0 C1,-32,0,-82,0,-132" stroke="#F4E8D5" stroke-width="2" fill="none"/>
    <path d="M-42,-30 C-15,-38,15,-38,42,-30" stroke="#F4E8D5" stroke-width="2.2" fill="none"/>
    <ellipse cx="0" cy="-66" rx="22" ry="24" fill="#F4E8D5"/>
  </g>
</svg>
