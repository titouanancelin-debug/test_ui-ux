<svg width="560" height="320" viewBox="0 0 560 320" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <rect width="560" height="320" fill="#F4E8D5"/>
  <text x="24" y="36" font-size="18" font-weight="400" letter-spacing="0.08em" fill="#2A1418">PALETTE DE COULEURS</text>
  <text x="24" y="54" font-size="11" font-style="italic" fill="#2A1418" opacity="0.6">Cie Rouletabille Théâtre · Saison 2025–2026</text>

  <!-- Row 1 -->
  <!-- Terracotta -->
  <rect x="24" y="72" width="96" height="80" rx="6" fill="#B84A2E"/>
  <text x="72" y="132" text-anchor="middle" font-size="10" fill="#F4E8D5" opacity="0.9">Terracotta</text>
  <text x="72" y="144" text-anchor="middle" font-size="9" fill="#F4E8D5" opacity="0.7">#B84A2E</text>

  <!-- Terracotta foncé -->
  <rect x="132" y="72" width="96" height="80" rx="6" fill="#8E3620"/>
  <text x="180" y="132" text-anchor="middle" font-size="10" fill="#F4E8D5" opacity="0.9">Terracotta foncé</text>
  <text x="180" y="144" text-anchor="middle" font-size="9" fill="#F4E8D5" opacity="0.7">#8E3620</text>

  <!-- Amber -->
  <rect x="240" y="72" width="96" height="80" rx="6" fill="#E8B542"/>
  <text x="288" y="132" text-anchor="middle" font-size="10" fill="#2A1418" opacity="0.9">Amber</text>
  <text x="288" y="144" text-anchor="middle" font-size="9" fill="#2A1418" opacity="0.7">#E8B542</text>

  <!-- Amber foncé -->
  <rect x="348" y="72" width="96" height="80" rx="6" fill="#C89420"/>
  <text x="396" y="132" text-anchor="middle" font-size="10" fill="#2A1418" opacity="0.9">Amber foncé</text>
  <text x="396" y="144" text-anchor="middle" font-size="9" fill="#2A1418" opacity="0.7">#C89420</text>

  <!-- Aubergine -->
  <rect x="456" y="72" width="80" height="80" rx="6" fill="#3A1B2E"/>
  <text x="496" y="132" text-anchor="middle" font-size="10" fill="#F4E8D5" opacity="0.9">Aubergine</text>
  <text x="496" y="144" text-anchor="middle" font-size="9" fill="#F4E8D5" opacity="0.7">#3A1B2E</text>

  <!-- Row 2 -->
  <!-- Prune -->
  <rect x="24" y="172" width="96" height="80" rx="6" fill="#9B7AA8"/>
  <text x="72" y="232" text-anchor="middle" font-size="10" fill="#F4E8D5" opacity="0.9">Prune</text>
  <text x="72" y="244" text-anchor="middle" font-size="9" fill="#F4E8D5" opacity="0.7">#9B7AA8</text>

  <!-- Papier -->
  <rect x="132" y="172" width="96" height="80" rx="6" fill="#F4E8D5" stroke="#2A1418" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="180" y="232" text-anchor="middle" font-size="10" fill="#2A1418" opacity="0.9">Papier</text>
  <text x="180" y="244" text-anchor="middle" font-size="9" fill="#2A1418" opacity="0.7">#F4E8D5</text>

  <!-- Papier chaud -->
  <rect x="240" y="172" width="96" height="80" rx="6" fill="#EFDCC0" stroke="#2A1418" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="288" y="232" text-anchor="middle" font-size="10" fill="#2A1418" opacity="0.9">Papier chaud</text>
  <text x="288" y="244" text-anchor="middle" font-size="9" fill="#2A1418" opacity="0.7">#EFDCC0</text>

  <!-- Encre -->
  <rect x="348" y="172" width="96" height="80" rx="6" fill="#2A1418"/>
  <text x="396" y="232" text-anchor="middle" font-size="10" fill="#F4E8D5" opacity="0.9">Encre</text>
  <text x="396" y="244" text-anchor="middle" font-size="9" fill="#F4E8D5" opacity="0.7">#2A1418</text>

  <!-- Footer -->
  <text x="24" y="295" font-size="10" fill="#2A1418" opacity="0.4" font-style="italic">rouletabilletheatre@gmail.com · 15 ch. des feutres du Toulon, 24000 Périgueux</text>
