<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8">
<title>Cie Rouletabille — Théâtre vivant, corps &amp; voix</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Compagnie de théâtre de création installée à Toulon depuis 2014. Spectacles, ateliers, médiation culturelle. Saison 2025–2026.">
<meta name="theme-color" content="#B84A2E">
<link rel="stylesheet" href="css/styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Inter:wght@400;500;600;700&family=Caveat:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
</head>
<body class="app-root">

<!-- Intro botanique — volée de physalis -->
<div id="curtain" class="curtain" aria-hidden="true">
  <svg class="bloom-svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <radialGradient id="bg-glow" cx="50%" cy="46%" r="55%">
        <stop offset="0%" stop-color="#7A3A50" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#2A1020" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="berry-grad" cx="35%" cy="32%" r="68%">
        <stop offset="0%" stop-color="#F07040"/>
        <stop offset="48%" stop-color="#C8481E"/>
        <stop offset="100%" stop-color="#8E3010"/>
      </radialGradient>
      <!-- Une physalis complète : cage de nervures + baie. Origine = centre de la baie. -->
      <g id="physalis">
        <path class="ph-rib" d="M0,66 C-52,48 -75,6 -50,-34 C-28,-56 0,-66 0,-66"/>
        <path class="ph-rib" d="M0,66 C52,48 75,6 50,-34 C28,-56 0,-66 0,-66"/>
        <path class="ph-rib" d="M0,66 C-26,52 -44,14 -28,-26 C-14,-52 0,-66 0,-66" opacity="0.78"/>
        <path class="ph-rib" d="M0,66 C26,52 44,14 28,-26 C14,-52 0,-66 0,-66" opacity="0.78"/>
        <path class="ph-rib" d="M0,66 C1,34 0,-16 0,-66" opacity="0.6"/>
        <path class="ph-vein" d="M-42,36 C-15,28 15,28 42,36"/>
        <path class="ph-vein" d="M-60,10 C-24,2 24,2 60,10"/>
        <path class="ph-vein" d="M-64,-16 C-24,-24 24,-24 64,-16"/>
        <path class="ph-vein" d="M-46,-40 C-18,-47 18,-47 46,-40"/>
        <ellipse class="ph-berry" cx="0" cy="0" rx="25" ry="27" fill="url(#berry-grad)"/>
        <ellipse class="ph-berry" cx="-8" cy="-8" rx="7" ry="8" fill="rgba(255,255,255,0.22)"/>
        <circle class="ph-bud" cx="0" cy="-66" r="3.2"/>
      </g>
    </defs>
    <rect x="0" y="0" width="1440" height="900" fill="url(#bg-glow)"/>
    <!-- Les <use> sont injectés/animés par initFX (positions, échelles, oscillation) -->
    <g id="physalis-field"></g>
  </svg>
  <div class="curtain-mark">
    <span class="curtain-word">Cie Rouletabille</span>
  </div>
</div>

<!-- Barre de progression de lecture -->
<div id="scroll-progress" class="scroll-progress" aria-hidden="true"></div>

<div id="root"></div>

<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="vendor/babel.min.js"></script>

<script type="text/babel" src="js/motif.jsx"></script>
<script type="text/babel" src="js/fx.jsx"></script>
<script type="text/babel" src="js/data.jsx"></script>
<script type="text/babel" src="js/screens.jsx"></script>
<script type="text/babel" src="js/app.js"></script>
</body></html>
