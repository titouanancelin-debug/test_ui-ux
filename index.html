<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8">
<title>Cie Rouletabille — Théâtre vivant, corps &amp; voix</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Compagnie de théâtre de création installée à Toulon depuis 2014. Spectacles, ateliers, médiation culturelle. Saison 2025–2026.">
<meta name="theme-color" content="#B84A2E">
<link rel="stylesheet" href="css/styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Inter:wght@400;500;600;700&family=Caveat:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
</head>
<body class="app-root">

<!-- Floraison botanique — intro -->
<div id="curtain" class="curtain" aria-hidden="true">
  <svg class="bloom-svg" viewBox="-260 -260 520 520" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#7A3A50" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#3A1B2E" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="berry-grad" cx="35%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#F07040"/>
        <stop offset="50%" stop-color="#C8481E"/>
        <stop offset="100%" stop-color="#8E3010"/>
      </radialGradient>
    </defs>
    <!-- ambient glow -->
    <circle cx="0" cy="0" r="220" fill="url(#bg-glow)" class="bloom-glow"/>
    <!-- Sepal 0 — all start pointing up (rotate 0), JS will animate to final angle -->
    <g class="sepal" data-angle="0">
      <path class="sepal-body" d="M0,0 C-22,-12 -36,-72 -28,-138 C-20,-188 -8,-218 0,-228 C8,-218 20,-188 28,-138 C36,-72 22,-12 0,0 Z"/>
      <path class="sv" d="M0,-4 L0,-224"/>
      <path class="sv" d="M-3,-42 C-10,-72 -14,-108 -8,-158"/>
      <path class="sv" d="M3,-42 C10,-72 14,-108 8,-158"/>
      <path class="sv" d="M-9,-100 C-15,-122 -16,-152 -10,-178"/>
      <path class="sv" d="M9,-100 C15,-122 16,-152 10,-178"/>
      <path class="sv" d="M-18,-68 C-24,-80 -26,-100 -20,-120"/>
      <path class="sv" d="M18,-68 C24,-80 26,-100 20,-120"/>
    </g>
    <!-- Sepal 1 — 72° -->
    <g class="sepal" data-angle="72">
      <path class="sepal-body" d="M0,0 C-22,-12 -36,-72 -28,-138 C-20,-188 -8,-218 0,-228 C8,-218 20,-188 28,-138 C36,-72 22,-12 0,0 Z"/>
      <path class="sv" d="M0,-4 L0,-224"/>
      <path class="sv" d="M-3,-42 C-10,-72 -14,-108 -8,-158"/>
      <path class="sv" d="M3,-42 C10,-72 14,-108 8,-158"/>
      <path class="sv" d="M-9,-100 C-15,-122 -16,-152 -10,-178"/>
      <path class="sv" d="M9,-100 C15,-122 16,-152 10,-178"/>
    </g>
    <!-- Sepal 2 — 144° -->
    <g class="sepal" data-angle="144">
      <path class="sepal-body" d="M0,0 C-22,-12 -36,-72 -28,-138 C-20,-188 -8,-218 0,-228 C8,-218 20,-188 28,-138 C36,-72 22,-12 0,0 Z"/>
      <path class="sv" d="M0,-4 L0,-224"/>
      <path class="sv" d="M-3,-42 C-10,-72 -14,-108 -8,-158"/>
      <path class="sv" d="M3,-42 C10,-72 14,-108 8,-158"/>
      <path class="sv" d="M-9,-100 C-15,-122 -16,-152 -10,-178"/>
      <path class="sv" d="M9,-100 C15,-122 16,-152 10,-178"/>
    </g>
    <!-- Sepal 3 — 216° (goes via -144°) -->
    <g class="sepal" data-angle="216">
      <path class="sepal-body" d="M0,0 C-22,-12 -36,-72 -28,-138 C-20,-188 -8,-218 0,-228 C8,-218 20,-188 28,-138 C36,-72 22,-12 0,0 Z"/>
      <path class="sv" d="M0,-4 L0,-224"/>
      <path class="sv" d="M-3,-42 C-10,-72 -14,-108 -8,-158"/>
      <path class="sv" d="M3,-42 C10,-72 14,-108 8,-158"/>
      <path class="sv" d="M-9,-100 C-15,-122 -16,-152 -10,-178"/>
      <path class="sv" d="M9,-100 C15,-122 16,-152 10,-178"/>
    </g>
    <!-- Sepal 4 — 288° (goes via -72°) -->
    <g class="sepal" data-angle="288">
      <path class="sepal-body" d="M0,0 C-22,-12 -36,-72 -28,-138 C-20,-188 -8,-218 0,-228 C8,-218 20,-188 28,-138 C36,-72 22,-12 0,0 Z"/>
      <path class="sv" d="M0,-4 L0,-224"/>
      <path class="sv" d="M-3,-42 C-10,-72 -14,-108 -8,-158"/>
      <path class="sv" d="M3,-42 C10,-72 14,-108 8,-158"/>
      <path class="sv" d="M-9,-100 C-15,-122 -16,-152 -10,-178"/>
      <path class="sv" d="M9,-100 C15,-122 16,-152 10,-178"/>
    </g>
    <!-- Centre ring -->
    <circle cx="0" cy="0" r="38" fill="#3A1B2E" class="bloom-center-ring"/>
    <!-- Berry -->
    <circle class="bloom-berry" cx="0" cy="0" r="30" fill="url(#berry-grad)"/>
    <ellipse cx="-10" cy="-10" rx="9" ry="9" fill="rgba(255,255,255,0.20)" class="bloom-berry"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#F5C842" stroke-width="0.9" opacity="0.5" class="bloom-berry"/>
  </svg>
  <div class="curtain-mark">
    <span class="curtain-word">Cie Rouletabille</span>
  </div>
</div>

<!-- Barre de progression de lecture -->
<div id="scroll-progress" class="scroll-progress" aria-hidden="true"></div>

<div id="root"></div>

<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="vendor/babel.min.js"></script>

<script type="text/babel" src="js/motif.jsx"></script>
<script type="text/babel" src="js/fx.jsx"></script>
<script type="text/babel" src="js/data.jsx"></script>
<script type="text/babel" src="js/screens.jsx"></script>
<script type="text/babel" src="js/app.js"></script>
</body></html>
